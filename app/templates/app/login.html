{% extends "./base.html" %}
{% load static %}
{% block title %}
Log in
{% endblock %}

{% block main %}
<div class="row">
    <div class="col-md-6 signupImgCont">
        <img class="signupImg" src="{% static 'img/signup.jpg' %}">
    </div>
    <div class="col-md-6 signupRight">
        <div class="snR">
            <h3>Welcome Back</h3>
            <form method="post">
                {% csrf_token %}
                <label>Username</label><br>
                <input type="text" name="username"><br>
                <label>Password</label><br>
                <input type="password" name="password"><br>
                <button class="btn btn-primary sUp">Sign in</button>
            </form>
            <p class="already">Don't have an account?     <a href="{% url 'signup' %}">  Sign up</a></p>
        </div>
    </div>

</div>
{% endblock %}
